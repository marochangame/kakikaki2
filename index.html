<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>マロちゃんカキカキ2</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;background:#ffd98a;font-family:sans-serif}
.app{height:100dvh;display:grid;grid-template-rows:auto 1fr auto;gap:8px;padding:8px}
.top{display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:900;font-size:24px;color:#67a94a}
.stage{position:relative;border-radius:20px;overflow:hidden;background:#fff5d6}
.maro{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:90%}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{padding:14px;border-radius:20px;border:none;font-weight:900;font-size:18px}
.kaki{background:#ffb37a}
.gift{background:#ffb3c7}
.speech{position:absolute;top:10px;left:10px;background:white;padding:8px 12px;border-radius:15px;font-weight:900;opacity:0;transition:.2s}
.speech.show{opacity:1}
.bar{position:absolute;bottom:10px;left:10px;right:10px;background:#eee;border-radius:20px;height:20px;overflow:hidden}
.fill{height:100%;background:linear-gradient(90deg,#ff79a2,#ffd55f,#83da5f);width:50%}
</style>
</head>
<body>
<div class="app">
<div class="top">
<div class="logo">マロちゃんカキカキ2</div>
<div>⭐<span id="pt">0</span></div>
</div>

<div class="stage" id="stage">
<img src="maro.png" class="maro">
<div class="speech" id="speech"></div>
<div class="bar"><div class="fill" id="fill"></div></div>
</div>

<div class="controls">
<button class="kaki" onclick="kaki()">✨カキカキ</button>
<button class="gift" onclick="gift()">🎁ごほうび</button>
</div>
</div>

<script>
let pct=50,pt=0;
const voices=["ぴっ！","ぴよぴよ♪","きゅるる〜","ぷきゅっ","ちゅん♪","マロちゃ〜ん","ふわぁ…","だいすき♪"];
function rand(){return voices[Math.floor(Math.random()*voices.length)]}

function show(text){
const s=document.getElementById("speech");
s.innerText=text;
s.classList.add("show");
setTimeout(()=>s.classList.remove("show"),800);
}

function update(){
document.getElementById("fill").style.width=pct+"%";
document.getElementById("pt").innerText=pt;
}

function kaki(){
pct=Math.min(100,pct+7);
pt+=50;
show(rand());
update();
}

function gift(){
pct=Math.min(100,pct+12);
pt+=120;
show(rand());
update();
}
update();
</script>
</body>
</html>
