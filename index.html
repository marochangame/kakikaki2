<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffd98a">
<title>マロちゃんカキカキ2</title>
<link rel="manifest" href="manifest.json?v=god1">
<style>
:root{
  --ink:#4d3218;
  --line:rgba(130,78,28,.24);
  --cream:rgba(255,252,239,.86);
  --cream2:rgba(255,244,211,.86);
  --orange:#ffad67;
  --yellow:#ffd76b;
  --pink:#ff7ca5;
  --green:#7fd35c;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:#ffd98a;color:var(--ink)}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;
  background:
    radial-gradient(circle at 12% 8%,rgba(255,255,255,.8),transparent 22%),
    radial-gradient(circle at 90% 0%,rgba(255,255,255,.45),transparent 22%),
    linear-gradient(160deg,#fff2c8 0%,#ffd98a 46%,#f5b35d 100%);
  overflow-x:hidden;
}
.app{
  width:min(100%,540px);
  min-height:100dvh;
  margin:0 auto;
  padding:10px 12px calc(16px + env(safe-area-inset-bottom));
  display:flex;
  flex-direction:column;
  gap:9px;
}
.top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
}
.logo{
  white-space:nowrap;
  font-weight:1000;
  font-size:clamp(22px,7vw,34px);
  letter-spacing:-1.2px;
  line-height:1;
  color:#67a94a;
  -webkit-text-stroke:4px #fff7d8;
  paint-order:stroke fill;
  filter:drop-shadow(0 3px 0 rgba(122,75,34,.16));
}
.badges{display:flex;gap:6px;align-items:center}
.pill{
  border:2px solid var(--line);
  border-radius:18px;
  background:rgba(255,255,255,.74);
  box-shadow:0 6px 0 rgba(122,75,34,.12);
  padding:7px 10px;
  font-weight:1000;
  font-size:16px;
  white-space:nowrap;
}
.stage{
  position:relative;
  height:min(64dvh,610px);
  min-height:510px;
  border:3px solid rgba(122,75,34,.20);
  border-radius:30px;
  overflow:hidden;
  background:rgba(255,250,226,.72);
  box-shadow:0 14px 34px rgba(122,75,34,.20), inset 0 0 0 6px rgba(255,255,255,.18);
}
.bg{
  position:absolute;inset:0;
  background-image:url("maro_fixed_art_20260429.png?v=god1");
  background-size:cover;
  background-position:center;
  filter:blur(14px) saturate(1.06) brightness(1.08);
  transform:scale(1.08);
  opacity:.24;
}
.maroWrap{
  position:absolute;
  left:50%;
  top:47%;
  width:min(96%,500px);
  aspect-ratio:1/1;
  transform:translate(-50%,-50%);
  z-index:4;
  display:grid;
  place-items:center;
}
.maro{
  width:100%;
  height:100%;
  object-fit:contain;
  user-select:none;
  pointer-events:none;
  transform-origin:50% 72%;
  filter:drop-shadow(0 18px 20px rgba(80,44,16,.25));
}
.maro.idle{animation:breath 2.5s ease-in-out infinite}
.maro.kaki{animation:kaki .48s ease-in-out infinite}
.maro.happy{animation:happy .42s ease-in-out infinite}
.maro.sleepy{animation:sleepy 2.2s ease-in-out infinite}
@keyframes breath{0%,100%{transform:scale(1) rotate(-.5deg)}50%{transform:scale(1.022) rotate(.6deg)}}
@keyframes kaki{0%,100%{transform:scale(1.02) rotate(-1.8deg)}50%{transform:scale(1.06) rotate(1.8deg)}}
@keyframes happy{0%,100%{transform:translateY(0) scale(1.04) rotate(-2.5deg)}50%{transform:translateY(-16px) scale(1.08) rotate(2.5deg)}}
@keyframes sleepy{0%,100%{transform:scale(1) rotate(-1deg);filter:drop-shadow(0 18px 20px rgba(80,44,16,.25)) brightness(.94)}50%{transform:scale(.985) rotate(1deg);filter:drop-shadow(0 18px 20px rgba(80,44,16,.25)) brightness(.86)}}

.perch{
  position:absolute;
  left:5%;right:5%;
  bottom:19%;
  height:28px;
  border-radius:999px;
  background:linear-gradient(#dfab55,#955d1b);
  border:3px solid rgba(96,54,12,.42);
  z-index:3;
  box-shadow:0 9px 18px rgba(87,45,10,.22);
}
.speech{
  position:absolute;
  z-index:12;
  left:17px;
  top:18px;
  max-width:45%;
  padding:8px 10px;
  color:#f06f99;
  background:rgba(255,255,255,.92);
  border:3px solid rgba(255,165,190,.52);
  border-radius:17px 18px 18px 8px;
  box-shadow:0 7px 14px rgba(122,75,34,.13);
  font-weight:1000;
  font-size:15px;
  line-height:1.18;
  text-align:center;
  transform:rotate(-4deg) translateY(-6px) scale(.92);
  opacity:0;
  pointer-events:none;
}
.speech:before{
  content:"";
  position:absolute;
  left:18px;
  bottom:-11px;
  width:18px;height:18px;
  background:rgba(255,255,255,.92);
  border-right:3px solid rgba(255,165,190,.52);
  border-bottom:3px solid rgba(255,165,190,.52);
  transform:rotate(45deg);
}
.speech.show{
  opacity:1;
  animation:bubble .98s ease-out forwards;
}
@keyframes bubble{
  0%{opacity:0;transform:rotate(-4deg) translateY(8px) scale(.65)}
  18%{opacity:1;transform:rotate(-4deg) translateY(-5px) scale(1.08)}
  78%{opacity:1;transform:rotate(-4deg) translateY(-3px) scale(1)}
  100%{opacity:0;transform:rotate(-4deg) translateY(-10px) scale(.96)}
}
.miniStar{
  position:absolute;
  z-index:13;
  left:calc(17px + 42%);
  top:68px;
  font-size:22px;
  opacity:0;
  pointer-events:none;
}
.miniStar.show{animation:starPop 1s ease-out forwards}
@keyframes starPop{
  0%{opacity:0;transform:scale(.4) rotate(-20deg)}
  25%,75%{opacity:1;transform:scale(1.18) rotate(12deg)}
  100%{opacity:0;transform:scale(.8) rotate(30deg)}
}

.meterCard{
  position:absolute;
  left:14px;right:14px;bottom:12px;
  z-index:10;
  background:rgba(255,255,255,.78);
  border:3px solid rgba(122,75,34,.18);
  border-radius:21px;
  padding:9px;
  box-shadow:0 7px 0 rgba(122,75,34,.10);
}
.meterTop{display:flex;justify-content:space-between;align-items:center;font-weight:1000;font-size:17px;margin:0 4px 7px}
.meter{
  height:20px;border-radius:999px;overflow:hidden;
  background:#ffe9bb;border:2px solid rgba(122,75,34,.18);
}
.fill{
  height:100%;width:50%;border-radius:999px;
  background:linear-gradient(90deg,#ff79a2,#ffd55f,#83da5f);
  transition:width .25s ease;
}
.fx{
  position:absolute;z-index:14;pointer-events:none;
  animation:floatUp 1.1s ease-out forwards;
  font-size:25px;
}
@keyframes floatUp{
  0%{opacity:0;transform:translateY(14px) scale(.45) rotate(0)}
  18%{opacity:1}
  100%{opacity:0;transform:translateY(-92px) scale(1.5) rotate(22deg)}
}
.controls{display:grid;grid-template-columns:1.2fr 1fr 1fr;gap:8px}
button{
  touch-action:manipulation;
  border:0;
  border-radius:22px;
  padding:13px 7px;
  color:#5b3819;
  background:linear-gradient(#fff8df,#ffc86e);
  border:2px solid rgba(122,75,34,.20);
  box-shadow:0 7px 0 rgba(122,75,34,.20);
  font-weight:1000;
  font-size:16px;
}
button:active{transform:translateY(4px);box-shadow:0 3px 0 rgba(122,75,34,.20)}
.primary{background:linear-gradient(#fff0b7,#ff9d72)}
.panel{
  background:rgba(255,255,255,.62);
  border:2px solid rgba(122,75,34,.16);
  border-radius:22px;
  padding:10px;
}
.panelTitle{font-weight:1000;margin-bottom:7px}
.soundGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.soundGrid button{padding:10px 5px;font-size:13px;border-radius:16px}
.soundGrid button.selected{background:linear-gradient(#fff7cf,#ff9fbc)}
.toast{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%);
  z-index:30;
  opacity:0;
  background:#fffdf4;
  border:3px solid rgba(122,75,34,.22);
  border-radius:999px;
  padding:10px 16px;
  font-weight:1000;
  box-shadow:0 8px 18px rgba(80,44,16,.18);
  transition:.25s;
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(-10px)}
.album{
  display:none;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:8px;
}
.album.on{display:grid}
.album div{
  min-height:64px;
  border-radius:16px;
  border:2px solid rgba(122,75,34,.16);
  background:rgba(255,255,255,.5);
  display:grid;
  place-items:center;
  font-size:28px;
  box-shadow:inset 0 0 0 3px rgba(255,255,255,.16);
}
@media(max-height:760px){
  .app{padding-top:7px;gap:7px}
  .logo{font-size:21px}
  .pill{font-size:15px;padding:6px 9px}
  .stage{height:62dvh;min-height:462px}
  .maroWrap{width:min(93%,455px);top:48%}
  .speech{font-size:14px;max-width:42%;top:14px}
  button{padding:11px 6px}
  .panel{padding:8px}
  .soundGrid button{padding:9px 5px}
}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div class="logo">マロちゃんカキカキ2</div>
    <div class="badges">
      <div class="pill">⭐ <span id="pt">0</span>pt</div>
    </div>
  </div>

  <div class="stage" id="stage" aria-label="マロちゃんエリア">
    <div class="bg"></div>
    <div class="speech" id="speech">きもちいい〜♪</div>
    <div class="miniStar" id="miniStar">⭐</div>
    <div class="maroWrap">
      <img class="maro idle" id="maro" src="maro_fixed_art_20260429.png?v=god1" alt="マロちゃん">
    </div>
    <div class="perch"></div>
    <div class="meterCard">
      <div class="meterTop"><span>なかよし度</span><span id="pct">50%</span></div>
      <div class="meter"><div class="fill" id="fill"></div></div>
    </div>
  </div>

  <div class="controls">
    <button class="primary" id="kakiBtn" type="button">カキカキする</button>
    <button id="voiceBtn" type="button">鳴き声</button>
    <button id="giftBtn" type="button">ごほうび</button>
  </div>

  <div class="panel">
    <div class="panelTitle">鳴き声モード</div>
    <div class="soundGrid">
      <button type="button" data-mode="genki" class="selected">元気：ぴーぴー！</button>
      <button type="button" data-mode="amae">甘え：きゅるる〜♪</button>
      <button type="button" data-mode="talk">おしゃべり：マロちゃ〜ん</button>
      <button type="button" data-mode="sleep">ねむねむ：すやぁ…</button>
    </div>
    <div class="album" id="album">
      <div>🌻</div><div>🌾</div><div>🍃</div>
    </div>
  </div>
</div>
<div class="toast" id="toast">OK</div>

<script>
let pct=50, pt=0, mode="genki", happyTimer=null, albumOpen=false;
const $=id=>document.getElementById(id);
const maro=$("maro"), speech=$("speech"), fill=$("fill"), pctEl=$("pct"), ptEl=$("pt");
const stage=$("stage"), toast=$("toast"), miniStar=$("miniStar"), album=$("album");

const lines={
 genki:["ぴーぴー！","マロちゃん元気！","カキカキうれしい！"],
 amae:["きゅるる〜♪","そこそこ〜♪","あまえんぼマロちゃん"],
 talk:["マロちゃ〜ん！","ろまちゃん♪","だいすき！"],
 sleep:["すやぁ…","ねむねむ…","ふわぁ…"]
};
const gifts=["ひまわりのタネ ゲット！","あわの穂 ゲット！","大好きな葉っぱ ゲット！"];

function rand(a){return a[Math.floor(Math.random()*a.length)]}
function setMaro(cls){maro.className="maro "+cls}
function update(){fill.style.width=pct+"%";pctEl.textContent=pct+"%";ptEl.textContent=pt}
function showToast(t){toast.textContent=t;toast.classList.add("on");setTimeout(()=>toast.classList.remove("on"),950)}

function pop(text){
  speech.textContent=text;
  speech.classList.remove("show");
  miniStar.classList.remove("show");
  void speech.offsetWidth;
  speech.classList.add("show");
  miniStar.classList.add("show");
}
function fx(){
  for(let i=0;i<10;i++){
    const e=document.createElement("div");
    e.className="fx";
    e.textContent=Math.random()>.5?"💗":"✨";
    e.style.left=(18+Math.random()*66)+"%";
    e.style.top=(24+Math.random()*48)+"%";
    e.style.animationDelay=(Math.random()*0.18)+"s";
    stage.appendChild(e);
    setTimeout(()=>e.remove(),1400);
  }
}
function tone(freq=660,dur=.11,type="sine",vol=.055){
  try{
    const AC=window.AudioContext||window.webkitAudioContext;
    if(!AC)return;
    window.ac=window.ac||new AC();
    if(ac.state==="suspended")ac.resume();
    const o=ac.createOscillator(),g=ac.createGain();
    o.type=type;o.frequency.value=freq;g.gain.value=vol;
    o.connect(g);g.connect(ac.destination);o.start();
    g.gain.exponentialRampToValueAtTime(.0001,ac.currentTime+dur);
    o.stop(ac.currentTime+dur);
  }catch(e){}
}
function chirp(){
  const seq=mode==="amae"?[560,690,820]:mode==="talk"?[520,520,760,680]:mode==="sleep"?[360,320]:[780,980,860];
  seq.forEach((f,i)=>setTimeout(()=>tone(f,.11,"sine",.055),i*90));
}
function kaki(){
  clearTimeout(happyTimer);
  pct=Math.min(100,pct+7);
  pt+=50;
  update();
  setMaro(pct>=100?"happy":"kaki");
  pop(pct>=100?"大よろこび！！だいすき！":"きもちいい〜♪");
  fx();chirp();
  happyTimer=setTimeout(()=>setMaro(pct>=100?"happy":(mode==="sleep"?"sleepy":"idle")),850);
}
function voice(){
  pop(rand(lines[mode]));
  chirp();fx();showToast("鳴き声： "+modeName());
}
function gift(){
  pt+=200;
  pct=Math.min(100,pct+10);
  update();
  pop(rand(gifts));
  fx();chirp();
  showToast("ごほうびゲット！");
  album.classList.add("on");
  setMaro("happy");
  clearTimeout(happyTimer);
  happyTimer=setTimeout(()=>setMaro(mode==="sleep"?"sleepy":"idle"),900);
}
function modeName(){return mode==="genki"?"元気":mode==="amae"?"甘え":mode==="talk"?"おしゃべり":"ねむねむ"}

$("kakiBtn").addEventListener("click",e=>{e.stopPropagation();kaki()});
$("voiceBtn").addEventListener("click",e=>{e.stopPropagation();voice()});
$("giftBtn").addEventListener("click",e=>{e.stopPropagation();gift()});
document.querySelectorAll("[data-mode]").forEach(b=>b.addEventListener("click",e=>{
  e.stopPropagation();
  mode=b.dataset.mode;
  document.querySelectorAll("[data-mode]").forEach(x=>x.classList.remove("selected"));
  b.classList.add("selected");
  pop("鳴き声モード： "+modeName());
  chirp();
  showToast("変更したよ♪");
  setMaro(mode==="sleep"?"sleepy":"idle");
}));
stage.addEventListener("click",kaki);
update();
</script>
</body>
</html>
