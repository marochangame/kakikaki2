<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>マロちゃんカキカキ2</title>
<style>
body{margin:0;font-family:sans-serif;background:#ffd98a}
.app{max-width:540px;margin:auto;padding:10px}
.header{display:flex;justify-content:space-between;align-items:center}
.logo{font-weight:bold;font-size:24px;color:#5fa83f}
.badge{background:#fff;padding:6px 10px;border-radius:12px}
.stage{position:relative;height:60vh;background:#fff8e0;border-radius:20px;overflow:hidden}
.maroWrap{position:absolute;top:55%;left:50%;transform:translate(-50%,-50%);width:80%}
.maro{width:100%}
.speech{
  position:absolute;
  top:8px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;
  padding:6px 12px;
  border-radius:12px;
  font-weight:bold;
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo">マロちゃんカキカキ2</div>
    <div class="badge">⭐150pt</div>
  </div>

  <div class="stage">
    <div class="speech">マロちゃん元気！</div>
    <div class="maroWrap">
      <img src="maro_illust.png" class="maro">
    </div>
  </div>
</div>
</body>
</html>
