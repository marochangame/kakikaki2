<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>マロちゃんカキカキゲーム 改良版</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon.png">
<meta name="theme-color" content="#f7c56b">
<style>
:root{--bg:#ffe9b7;--card:#fff7dc;--line:#b57730;--text:#6b431e;--accent:#ff9b4a;--green:#94c95e;--cream:#fff1b8;--pink:#ff7c8c}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;background:radial-gradient(circle at 30% 8%,#fff8da 0 8%,transparent 25%),linear-gradient(#ffd987,#ffeec5);color:var(--text);overflow:hidden;user-select:none}.app{max-width:520px;margin:0 auto;min-height:100vh;padding:14px;display:flex;flex-direction:column;gap:10px}.top{display:flex;align-items:center;justify-content:space-between;gap:8px}.title{font-weight:900;font-size:28px;line-height:1;color:#6f421f;text-shadow:2px 2px 0 #fff,4px 4px 0 #d9983e}.badge{font-weight:800;background:#fff3c8;border:3px solid #c18435;border-radius:999px;padding:6px 12px;box-shadow:0 3px 0 #a76829}.score{font-weight:900;font-size:18px}.stage{position:relative;flex:1;min-height:430px;border:4px solid #bd7b2d;border-radius:28px;background:linear-gradient(rgba(255,244,202,.84),rgba(255,238,179,.88)),url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="500" height="650"><rect fill="%23e2a34b" width="500" height="650"/><g stroke="%23905b26" stroke-width="5" opacity=".28"><path d="M0 120h500M0 430h500"/><path d="M55 90h60v120H55zM165 125h50v84h-50zM330 80c55 0 52 125 0 125s-56-125 0-125zM415 138h46v80h-46z"/><path d="M45 430v-90h55v90M385 430v-80h65v80"/></g></svg>');background-size:cover;box-shadow:inset 0 0 40px #fff2,0 8px 0 #a86b25;overflow:hidden}.perch{position:absolute;left:-20px;right:-20px;bottom:86px;height:34px;border-radius:30px;background:linear-gradient(#d99736,#a9671f);border:3px solid #855119;box-shadow:0 8px 12px #0002}.birdWrap{position:absolute;left:50%;bottom:82px;transform:translateX(-50%);width:270px;height:330px;display:grid;place-items:end center}.bird{position:relative;width:245px;height:290px;transform-origin:50% 90%;animation:idle 2.8s ease-in-out infinite}.body{position:absolute;left:32px;bottom:26px;width:190px;height:225px;border-radius:52% 48% 48% 52%/42% 42% 58% 58%;background:radial-gradient(circle at 54% 16%,#ffeab0 0 19%,#f6db75 33%,#acd160 58%,#5b9d5c 100%);box-shadow:inset -16px -26px 22px #477c4477,inset 18px 22px 20px #fff7}.headOrange{position:absolute;left:62px;top:26px;width:145px;height:80px;border-radius:70% 70% 44% 55%;background:linear-gradient(100deg,#a9cd5f 0 23%,#ffb254 48%,#ff9144 100%);opacity:.95}.face{position:absolute;left:82px;top:64px;width:116px;height:116px;border-radius:50%;background:#fff1b3cc}.eye{position:absolute;left:94px;top:88px;width:28px;height:34px;background:#15120f;border-radius:50%;box-shadow:inset 7px 6px 0 #ffffff}.eye.r{left:198px;top:96px;width:16px;height:28px}.beak{position:absolute;left:151px;top:104px;width:57px;height:72px;background:linear-gradient(#ffe59a,#e2a347);border:4px solid #9a6325;border-radius:58% 45% 62% 45%;transform:rotate(-7deg);clip-path:polygon(0 7%,100% 22%,78% 100%,17% 78%)}.wing{position:absolute;left:25px;bottom:48px;width:92px;height:178px;border-radius:80% 15% 65% 40%;background:linear-gradient(#8ac452,#3f7f50);box-shadow:inset -8px -14px 14px #24583888}.tail{position:absolute;left:82px;bottom:-8px;width:80px;height:92px;border-radius:0 0 50% 50%;background:linear-gradient(#5ea164,#2f6e55);z-index:-1}.foot{position:absolute;bottom:8px;width:27px;height:66px;border:5px solid #a56b3c;border-top:0;border-radius:0 0 18px 18px}.foot.a{left:90px}.foot.b{right:72px}.hand{position:absolute;right:-12px;top:120px;width:115px;height:95px;opacity:0;transform:rotate(-20deg);transition:.18s}.finger{position:absolute;right:0;top:26px;width:104px;height:28px;background:#ffd7b7;border:3px solid #a86b3b;border-radius:999px}.palm{position:absolute;right:70px;top:0;width:56px;height:70px;background:#ffd7b7;border:3px solid #a86b3b;border-radius:50%}.rub .hand{opacity:1;animation:scratch .23s linear infinite}.rub .bird{animation:happy .45s ease-in-out infinite}.max .bird{animation:jump .55s ease-in-out infinite}.sleep .bird{animation:sleep 2.1s ease-in-out infinite}.msg{position:absolute;left:20px;right:20px;top:18px;text-align:center;font-size:26px;font-weight:900;color:#ff724e;text-shadow:2px 2px #fff}.float{position:absolute;font-size:30px;animation:floatUp 1s ease-out forwards;pointer-events:none}.meterBox{position:absolute;left:22px;right:22px;bottom:22px}.meterText{font-weight:900;text-align:center;margin-bottom:6px}.meter{height:30px;background:#fff;border:4px solid #9b672e;border-radius:999px;overflow:hidden}.bar{height:100%;width:50%;background:linear-gradient(90deg,#ff7791,#ffd35d,#87cc5e);border-radius:999px;transition:width .18s}.controls{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.btn{border:3px solid #ad7130;background:linear-gradient(#fff9de,#ffd98b);border-radius:18px;padding:12px 8px;font-weight:900;color:#70421f;font-size:16px;box-shadow:0 5px 0 #9d6025}.btn:active{transform:translateY(3px);box-shadow:0 2px 0 #9d6025}.panel{display:none;position:absolute;inset:16px;background:#fff8dfef;border:4px solid #b6762d;border-radius:24px;padding:16px;z-index:5;overflow:auto}.panel.show{display:block}.voiceRow{display:flex;align-items:center;justify-content:space-between;background:#fff;border:2px solid #d69d51;border-radius:16px;margin:8px 0;padding:10px;font-weight:800}.small{font-size:13px;opacity:.8}.treats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.treat{background:#fff;border:2px solid #d69d51;border-radius:16px;padding:10px;text-align:center;font-weight:900}.confetti{position:absolute;inset:0;pointer-events:none}@keyframes idle{50%{transform:translateY(-7px) rotate(1deg)}}@keyframes happy{0%,100%{transform:rotate(-4deg) scale(1.02)}50%{transform:rotate(4deg) scale(1.05)}}@keyframes jump{0%,100%{transform:translateY(0) scale(1.03)}50%{transform:translateY(-28px) scale(1.08)}}@keyframes scratch{50%{transform:translate(-20px,12px) rotate(-11deg)}}@keyframes sleep{50%{transform:translateY(8px) rotate(-2deg) scale(.98)}}@keyframes floatUp{to{transform:translateY(-95px);opacity:0}}.z{position:absolute;right:100px;top:100px;font-size:34px;color:#75a1dd;animation:floatUp 1.8s infinite}.hidden{display:none}
</style>
</head>
<body>
<div class="app"><div class="top"><div class="title">マロちゃん<br>カキカキゲーム</div><div><span class="badge">改良版</span><div class="score">⭐ <span id="score">0</span>pt</div></div></div><div class="stage" id="stage"><div class="msg" id="msg">半分はすでに仲良し♪</div><div class="birdWrap" id="touch"><div class="bird" id="bird"><div class="tail"></div><div class="body"></div><div class="wing"></div><div class="headOrange"></div><div class="face"></div><div class="eye"></div><div class="eye r"></div><div class="beak"></div><div class="foot a"></div><div class="foot b"></div></div><div class="hand"><div class="palm"></div><div class="finger"></div></div></div><div class="perch"></div><div class="meterBox"><div class="meterText">なかよし度 <span id="loveText">50</span>%</div><div class="meter"><div class="bar" id="bar"></div></div></div><div class="confetti" id="confetti"></div><div class="panel" id="voicePanel"><h2>鳴き声変更</h2><div id="voices"></div><button class="btn" onclick="closePanel()">閉じる</button></div><div class="panel" id="albumPanel"><h2>アルバム</h2><p class="small">なかよし度で表情が増えるよ</p><div class="treats" id="album"></div><button class="btn" onclick="closePanel()">閉じる</button></div><div class="panel" id="treatPanel"><h2>ごほうび</h2><div class="treats"><button class="treat" onclick="giveTreat('ひまわりのタネ')">🌻<br>ひまわりのタネ</button><button class="treat" onclick="giveTreat('あわの穂')">🌾<br>あわの穂</button><button class="treat" onclick="giveTreat('葉っぱ')">🌿<br>大好きな葉っぱ</button></div><button class="btn" onclick="closePanel()">閉じる</button></div></div><div class="controls"><button class="btn" id="scratchBtn">👆 カキカキ</button><button class="btn" onclick="openPanel('voicePanel')">🎵 鳴き声</button><button class="btn" onclick="openPanel('treatPanel')">🎁 ごほうび</button><button class="btn" onclick="openPanel('albumPanel')">📖 アルバム</button><button class="btn" onclick="nap()">💤 ねむねむ</button><button class="btn" onclick="resetGame()">⚙️ リセット</button></div></div>
<script>
const voices=[['元気な鳴き声','ぴーぴー！',720,900],['甘えんぼモード','きゅるる〜♪',560,760],['おしゃべりモード','マロちゃーん！',420,620],['ご機嫌モード','ぴゅいっ♪',850,1050],['ねむねむモード','すやぁ…',260,360]];
let love=Number(localStorage.maroLove||50),score=Number(localStorage.maroScore||0),voice=Number(localStorage.maroVoice||0),scratching=false,maxed=false;
const stage=document.getElementById('stage'),bird=document.getElementById('bird'),bar=document.getElementById('bar'),loveText=document.getElementById('loveText'),msg=document.getElementById('msg'),scoreEl=document.getElementById('score'),touch=document.getElementById('touch');
function save(){localStorage.maroLove=love;localStorage.maroScore=score;localStorage.maroVoice=voice}function draw(){bar.style.width=love+'%';loveText.textContent=Math.round(love);scoreEl.textContent=score;stage.classList.toggle('max',love>=100&&!stage.classList.contains('sleep'));if(love>=100)msg.textContent='きたきた！大好き〜♪';else if(love>75)msg.textContent='もっとカキカキして〜';else msg.textContent='半分はすでに仲良し♪';save()}draw();
function audio(freq1,freq2,txt){try{const ac=new(window.AudioContext||window.webkitAudioContext)();let t=ac.currentTime;[freq1,freq2,freq1*1.12].forEach((f,i)=>{const o=ac.createOscillator(),g=ac.createGain();o.type='sine';o.frequency.setValueAtTime(f,t+i*.11);g.gain.setValueAtTime(.0001,t+i*.11);g.gain.exponentialRampToValueAtTime(.13,t+i*.11+.03);g.gain.exponentialRampToValueAtTime(.001,t+i*.11+.1);o.connect(g).connect(ac.destination);o.start(t+i*.11);o.stop(t+i*.11+.12)});}catch(e){} }
function say(){let v=voices[voice];msg.textContent=v[1];audio(v[2],v[3],v[1])}
function scratch(){stage.classList.remove('sleep');stage.classList.add('rub');love=Math.min(100,love+2.5);score+=10;say();spark('💛');if(love>=100){celebrate()}draw();clearTimeout(window.stopRub);window.stopRub=setTimeout(()=>stage.classList.remove('rub'),650)}
function celebrate(){if(maxed)return;maxed=true;msg.textContent='きたきた！マロちゃん大喜び！';for(let i=0;i<28;i++)setTimeout(()=>spark(['✨','💛','🌟','💕'][i%4]),i*35);audio(600,920);setTimeout(()=>maxed=false,2500)}
function spark(ch){let e=document.createElement('div');e.className='float';e.textContent=ch;e.style.left=(30+Math.random()*70)+'%';e.style.top=(36+Math.random()*22)+'%';stage.appendChild(e);setTimeout(()=>e.remove(),1000)}
function nap(){stage.classList.remove('rub','max');stage.classList.add('sleep');msg.textContent='すやぁ… またカキカキしてね';let z=document.createElement('div');z.className='z';z.textContent='Zzz';stage.appendChild(z);setTimeout(()=>z.remove(),2500)}
function giveTreat(name){love=Math.min(100,love+8);score+=80;msg.textContent=name+' うれしい〜♪';spark('🎁');say();draw();closePanel()}function resetGame(){love=50;score=0;stage.classList.remove('sleep','max','rub');msg.textContent='半分はすでに仲良し♪';draw()}
function openPanel(id){document.getElementById(id).classList.add('show');if(id==='albumPanel')album()}function closePanel(){document.querySelectorAll('.panel').forEach(p=>p.classList.remove('show'))}
document.getElementById('scratchBtn').addEventListener('pointerdown',scratch);touch.addEventListener('pointerdown',scratch);touch.addEventListener('pointermove',e=>{if(e.pressure>0||e.buttons) scratch()});
const voicesDiv=document.getElementById('voices');voices.forEach((v,i)=>{let row=document.createElement('div');row.className='voiceRow';row.innerHTML=`<div>🐥 ${v[0]}<br><span class="small">${v[1]}</span></div><button class="btn">再生</button>`;row.onclick=()=>{voice=i;localStorage.maroVoice=i;say()};voicesDiv.appendChild(row)});
function album(){let a=document.getElementById('album');a.innerHTML='';['にこにこ','ごきげん','大喜び','ねむねむ','ごほうび'].forEach((x,i)=>{let d=document.createElement('div');d.className='treat';d.innerHTML=(love>=(i+1)*18?'🐥':'🔒')+'<br>'+x;a.appendChild(d)})}
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}
</script>
</body></html>
