<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マロちゃんカキカキ</title>
<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f7e6b5;
  text-align:center;
}
.container {
  padding:20px;
}
img {
  width:250px;
}
button {
  margin:10px;
  padding:12px 20px;
  border-radius:20px;
  border:none;
  background:#ffcc80;
  font-size:16px;
}
.bar {
  width:80%;
  height:20px;
  background:#ddd;
  margin:10px auto;
  border-radius:10px;
}
.fill {
  height:100%;
  width:0%;
  background:#ff8a80;
  border-radius:10px;
}
</style>
</head>
<body>
<div class="container">
<h1>マロちゃんカキカキ🐥</h1>
<img src="maro.png" id="maro">
<div class="bar"><div class="fill" id="fill"></div></div>
<button onclick="kaki()">カキカキする</button>
<button onclick="sound()">鳴き声</button>
<p id="msg">なでて〜</p>
</div>

<script>
let val = 0;

function kaki(){
  val += 10;
  if(val>100) val=100;
  document.getElementById("fill").style.width = val+"%";
  document.getElementById("msg").innerText = "きもちいい〜♪";

  if(val==100){
    document.getElementById("msg").innerText = "だいすき！！";
  }
}

function sound(){
  const sounds = ["ぴよ！","きゅるる","ちゅん♪"];
  alert(sounds[Math.floor(Math.random()*sounds.length)]);
}
</script>
</body>
</html>
